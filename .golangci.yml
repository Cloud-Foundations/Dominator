version: "2"

run:
  timeout: 10m
  tests: true
  relative-path-mode: gomod

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - lll
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
    - godot

  settings:
    lll:
      line-length: 80
      tab-width: 1
    misspell:
      locale: US
    godot:
      scope: all
      period: true
      exclude:
        - '^go:'
        - '^\+build'
        - '^(?i)(todo|fixme|nolint):'
    errcheck:
      # This fixes the issue you had where fmt.Fprintf was failing the lint
      exclude-functions:
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint

  # These rules ensure lll doesn't annoy you on imports or URLs
  exclusions:
    rules:
      - linters: [lll]
        source: '^\s*"github\.com/Cloud-Foundations/(Dominator|tricoder)/.*"$'
      - linters: [lll]
        source: 'https?://'
      - linters: [lll]
        source: '^\s*//go:generate '
      - linters: [lll]
        path: '(^|/)testdata/'
      - linters: [errcheck]
        source: '^\s*defer .*\.Close\(\)$'
      - linters: [revive]
        path: '.*_test\.go$'

formatters:
  enable:
    - gofmt
    - goimports
    - golines
  settings:
    golines:
      max-len: 80
      shorten-comments: true
      no-chain-split-dots: true 
    goimports:
      local-prefixes: github.com 
